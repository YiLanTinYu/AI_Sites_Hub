name: Exchange rate monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "42 2 * * 1-5"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update ECB reference rate
        run: npm run update:rates

      - name: Validate build
        run: npm run build

      - name: Create review pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src/data/exchange-rates.json; then
            echo "Exchange rate is already current."
            exit 0
          fi
          branch="automation/exchange-rate"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"
          git add src/data/exchange-rates.json
          git commit -m "Update ECB exchange rate"
          git push --force-with-lease origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Update ECB exchange rate" \
            --body "Automated ECB USD/CNY reference-rate update. Review the source date and rate before merging." \
            || echo "An exchange-rate pull request may already be open."
